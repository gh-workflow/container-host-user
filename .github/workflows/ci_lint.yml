name: "CI: lint"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Run linters
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get user information
        run: |
          {
            echo "MEGALINTER_UID=$(id -u)"
            echo "MEGALINTER_GID=$(id -g)"
            echo "MEGALINTER_USER=$(id -un)"
          } >> "$GITHUB_ENV"

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ github.token }}
          # new non-root user feature
          MEGALINTER_UID: ${{ env.MEGALINTER_UID }}
          MEGALINTER_GID: ${{ env.MEGALINTER_GID }}
          MEGALINTER_USER: ${{ env.MEGALINTER_USER }}
          # shfmt shall prefer 2 spaces to indent not tabs
          BASH_SHFMT_ARGUMENTS: -indent 2 -case-indent

  ensure-immutable-actions:
    name: Run ensure-immutable-actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9f5dad6bb6148bd29ff0d874de6a8cc70af08fa9 # v2.6.2
        with:
          include-first-party: "true"
          write-job-summary: "on-failure-only"
