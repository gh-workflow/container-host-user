name: "CI: Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validation:
    uses: ./.github/workflows/ci_validation.yml

  verify-release-refs:
    name: Verify release references
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify release tag points to main
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit on origin/main." >&2
            exit 1
          fi

      - name: Verify image refs use current release
        run: |
          set -euo pipefail
          if grep -RInP "ghcr\.io/${GITHUB_REPOSITORY,,}:v(?!${GITHUB_REF_NAME#v}\b)\S*" .
          then
            echo "Found image refs not pinned to ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Verify changelog contains the release version
        run: |
          set -euo pipefail
          if ! grep -q "^## \\[${GITHUB_REF_NAME}\\] - " CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release heading for ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

  publish-image:
    needs:
      - validation
      - verify-release-refs
    uses: ./.github/workflows/ci_publish-image.yml
    permissions:
      contents: read
      packages: write
      id-token: write

  release:
    name: Publish GitHub release
    needs:
      - validation
      - verify-release-refs
      - publish-image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign container-host-user
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle ${{ runner.temp }}/container-host-user.sigstore.json \
            bin/container-host-user

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            bin/container-host-user \
            "${RUNNER_TEMP}/container-host-user.sigstore.json"
